<!--blogs/templates/blogs/home.html-->
{% extends 'blogs/base.html' %}
{% block title %} All Posts {% endblock title %}
{% block content %}
<div class="container my-4">

    <div class="card shadow-sm">
        <div class="card-header bg-secondary text-white">Blog Posts</div>
        <ul class="list-group list-group-flush">
            {% for post in posts %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{post.date_created|date:"j M Y"}}</span>
                <a href="{% url 'detail' post.id %}" class="text-decoration-none">{{post.title}}</a>
            </li>
            {% endfor %}
        </ul>
    </div>

    <div class="mt-4">
        <a href="{% url 'create' %}" class="btn btn-primary">Add Post</a>
    </div>

    {% endblock content %}
