{% block title %}Add Blog Post{% endblock title %}

{% block content %}
<div class="container">
    <h1>Add Blog Post</h1>

        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
    </form>
</div>
{% endblock content %}
