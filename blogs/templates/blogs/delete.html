{% block content %}
<h1>Do you want to delete this blog Post</h1>
<section>
<h1>{{post.title}}</h1>
<p>{{post.body}}</p>
<p>Created on {{post.date_created}}</p>
<p>Last Updated{{post.date_updated}}</p>
<p>By{{post.author}}</p>
</section>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Yes, delete</button>
</form>

{% endblock content %}
